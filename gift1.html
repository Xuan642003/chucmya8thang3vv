<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Game 8/3</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(120deg,#ff9ecf,#ffd6ec);
}

/* điểm */

#score{
position:fixed;
top:20px;
left:20px;
font-size:22px;
font-weight:bold;
background:white;
padding:10px 20px;
border-radius:20px;
}

/* chữ */

.item{
position:absolute;
padding:10px 20px;
border-radius:20px;
font-weight:bold;
}

/* thanh */

#bar{

position:fixed;
bottom:30px;

width:150px;
height:20px;

background:#ff4da6;

border-radius:10px;

left:50%;
transform:translateX(-50%);
}

/* màn thắng */

#win{

position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background:rgba(0,0,0,0.8);

display:none;

justify-content:center;
align-items:center;
flex-direction:column;

color:white;
text-align:center;
}

#win img{
width:300px;
border-radius:20px;
margin-bottom:20px;
}

</style>
</head>

<body>

<div id="score">Điểm: 0</div>

<div id="bar"></div>

<div id="win">

<img src="anh1.jpg">

<h1>CHÚC NGƯỜI MÀ TỚ THẦM THƯƠNG<br>8/3 VUI VẺ 🌸</h1>

</div>

<script>

let score=0
let speed=3

const goal=100

const texts=[
"🌸 8/3 vui vẻ",
"💐 luôn xinh đẹp",
"🌷 luôn hạnh phúc",
"🌹 luôn rạng rỡ",
"🌺 nhiều niềm vui",
"💖 nhiều may mắn",
"🌼 luôn tỏa sáng"
]

const badItems=[
"💣",
"😈",
"⚡"
]

const bar=document.getElementById("bar")

let barX=window.innerWidth/2

/* di chuyển chuột */

document.addEventListener("mousemove",e=>{
barX=e.clientX
bar.style.left=barX+"px"
})

/* di chuyển phím */

document.addEventListener("keydown",e=>{

if(e.key==="ArrowLeft"){

barX-=40

}

if(e.key==="ArrowRight"){

barX+=40

}

bar.style.left=barX+"px"

})

/* tạo vật */

function createItem(){

const div=document.createElement("div")

div.className="item"

let good=Math.random()>0.25

if(good){

div.innerText=texts[Math.floor(Math.random()*texts.length)]
div.dataset.type="good"
div.style.background="white"

}else{

div.innerText=badItems[Math.floor(Math.random()*badItems.length)]
div.dataset.type="bad"
div.style.background="#ff6666"

}

div.style.left=Math.random()*90+"%"
div.style.top="-40px"

document.body.appendChild(div)

let y=0

const fall=setInterval(()=>{

y+=speed

div.style.top=y+"px"

const rect=div.getBoundingClientRect()
const barRect=bar.getBoundingClientRect()

if(

rect.bottom>=barRect.top &&
rect.left<barRect.right &&
rect.right>barRect.left

){

if(div.dataset.type==="good"){

score++

showEffect("+1")

}else{

score-=5

showEffect("-5")

if(score<0) score=0

}

document.getElementById("score").innerText="Điểm: "+score

div.remove()
clearInterval(fall)

/* tăng tốc */

speed=3+score*0.05

if(score>=goal){

document.getElementById("win").style.display="flex"

}

}

if(y>window.innerHeight){

div.remove()
clearInterval(fall)

}

},20)

}

/* hiệu ứng điểm */

function showEffect(text){

const e=document.createElement("div")

e.innerText=text

e.style.position="fixed"
e.style.bottom="80px"
e.style.left=barX+"px"
e.style.fontSize="20px"
e.style.fontWeight="bold"

document.body.appendChild(e)

setTimeout(()=>{

e.remove()

},700)

}

/* tạo vật liên tục */

setInterval(createItem,900)

</script>

</body>
</html>
